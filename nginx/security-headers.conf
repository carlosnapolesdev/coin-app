# Included from every location block in default.conf on purpose: nginx does
# not inherit add_header into a location that declares one of its own, so
# omitting the include drops these silently — and only on the hashed assets,
# with the app still working and looking fine.
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
