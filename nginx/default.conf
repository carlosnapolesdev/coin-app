server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # The edge Caddy already does zstd/gzip; compressing twice buys nothing.
    gzip off;

    # Vite hashes these filenames, so a change always produces a new URL.
    location /assets/ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # The entry point must never be cached: a stale index.html points at asset
    # filenames that no longer exist after a deploy.
    location = /index.html {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache" always;
    }

    # SPA fallback: client-side routes are not files on disk. Fonts, favicons
    # and robots.txt that remain under public/ fall through here with nginx's
    # default ETag revalidation. The icon font now ships fingerprinted under
    # /assets/ (immutable), so no long-lived copy can go stale.
    location / {
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri $uri/ /index.html;
    }
}
