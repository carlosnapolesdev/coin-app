<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crecik – Grow your money, own your future</title>
    <meta
      name="description"
      content="Personal finance dashboard to track accounts, budgets, goals and recurring payments. Grow your money, own your future."
    />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F6F7F3" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0A0E0C" />
    <link rel="canonical" href="https://crecik.com/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Crecik" />
    <meta property="og:title" content="Crecik – Grow your money, own your future" />
    <meta
      property="og:description"
      content="Personal finance dashboard to track accounts, budgets, goals and recurring payments. Grow your money, own your future."
    />
    <meta property="og:url" content="https://crecik.com/" />
    <meta property="og:image" content="https://crecik.com/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Crecik — grow your money, own your future" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Crecik – Grow your money, own your future" />
    <meta
      name="twitter:description"
      content="Personal finance dashboard to track accounts, budgets, goals and recurring payments. Grow your money, own your future."
    />
    <meta name="twitter:image" content="https://crecik.com/og.png" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" sizes="16x16 32x32 48x48" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <script>
      (function () {
        try {
          var theme = localStorage.getItem('crecik-theme');
          if (theme !== 'light') {
            document.documentElement.classList.add('dark');
          }
          var locale = localStorage.getItem('crecik-locale');
          if (locale === 'en' || locale === 'es' || locale === 'pt') {
            document.documentElement.lang = locale;
          }
        } catch (error) {}
      })();
    </script>
    <style>
      /* First-paint splash for client-rendered (non-prerendered) routes: shows
         the brand instantly instead of a blank screen while the app bundle
         downloads and executes. Vue clears #app on mount(), which removes it.
         On the prerendered landing (/) vite-ssg replaces it with the real hero,
         so it never shows there. Self-contained inline CSS so it paints before
         the bundled stylesheet loads. Colours mirror --color-bg / --color-primary
         (see src/style.css). */
      #app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ecf3ee;
      }
      html.dark #app-splash {
        background: #0a0e0c;
      }
      #app-splash .spinner {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        border: 3px solid rgba(15, 107, 100, 0.18);
        border-top-color: #4f7a10;
        animation: app-splash-spin 0.7s linear infinite;
      }
      html.dark #app-splash .spinner {
        border-color: rgba(58, 168, 159, 0.22);
        border-top-color: #c8ff4d;
      }
      @media (prefers-reduced-motion: reduce) {
        #app-splash .spinner {
          animation: none;
        }
      }
      @keyframes app-splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="app-splash" aria-hidden="true"><div class="spinner"></div></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
