    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0A0E0C" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Crecik" />
    <meta property="og:title" content="Crecik – Grow your money, own your future" />
    <meta
      property="og:description"
      content="Personal finance dashboard to track accounts, budgets, goals and recurring payments. Grow your money, own your future."
    />
    <meta property="og:url" content="https://crecik.com/" />
    <meta property="og:image" content="https://crecik.com/og.png" />

    <link rel="manifest" href="/manifest.webmanifest" />

    <script>
      (function () {
        try {
          var theme = localStorage.getItem('crecik-theme');
          if (theme !== 'light') {
            document.documentElement.classList.add('dark');
          }
          var locale = localStorage.getItem('crecik-locale');
          if (locale === 'en' || locale === 'es' || locale === 'pt') {
            document.documentElement.lang = locale;
          }
        } catch (error) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
